<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Operator Matematika</title>
</head>  
<body>
<script>
    // Operator Aritmatika
    let result = 1 + 3
    document.writeln("<p>1 + 3 = " + result + "</p>")
    let originalResult = result;
    
    result = result - 1
    document.writeln("<p>"+ originalResult + " - 1 = " + result +"</p>")
    originalResult = result;
    
    result = result * 2
    document.writeln("<p>"+ originalResult + " * 2 = " + result +"</p>")
    originalResult = result;

    // Operator Augmented Assignments, Kayak bikin singkat gitu
    let result2 = 1 + 3
    document.writeln("<p>1 + 3 = " + result2 + "</p>")
    let originalResult2 = result2;
    
    result2 -= 1
    document.writeln("<p>"+ originalResult2 + " - 1 = " + result2 +"</p>")
    originalResult2 = result2;
    
    result2 *= 2
    document.writeln("<p>"+ originalResult2 + " * 2 = " + result2 +"</p>")
    originalResult2 = result2;

    // Operator Unary, hanya membutuhkan 1 angka
    let result3 = +1
    document.writeln("<p>" + result3 + "</p>")

    result3--
    document.writeln("<p>" + result3 + "</p>")

    result3++
    document.writeln("<p>" + result3 + "</p>")

    result3 = -result3
    document.writeln("<p>" + result3 + "</p>")
</script>
</body>
</html>
